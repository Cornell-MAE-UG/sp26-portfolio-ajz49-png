# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.


# Site Settings
locale                   : "en-US"
title                    : Zander Zhou
title_separator          : "-"
subtitle                 : This is a subtitle # site tagline that appears below site title in masthead
name                     : Zander Zhou
description              : Zander Zhou - Projects and CV 
baseurl                  : "/sp26-portfolio-ajz49-png/" # Set this to your repo name 

# Theme and Style
#theme: jekyll-theme-hydejack
remote_theme: hydecorp/hydejack@v9.2.1
color_scheme: light # light/default, dark, or aqua

sass:
  style: compressed

# Outputting
permalink: /:categories/:title/

collections:
  pages:
    output: true
  projects:
    output: true
    permalink: /:collection/:path/

# Markdown
markdown: kramdown
kramdown:
  input: GFM

# Plugins (previously gems:)
plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

